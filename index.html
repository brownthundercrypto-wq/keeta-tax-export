<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keeta Tax Export</title>
<!--
  The tool itself lives in /web/. It is kept there so it can load ../lib/*.js,
  the exact same files the Node CLI requires, rather than a copied or bundled
  duplicate. That is what makes the browser and CLI output byte-identical.

  This file exists only so the bare repository URL lands somewhere useful.
-->
<meta http-equiv="refresh" content="0; url=./web/">
<!--
  Canonical is THIS url, not ./web/. The tool is served from /web/ so it can
  load ../lib/*.js, but the address people are given is the repository root.
  Pointing canonical at ./web/ told crawlers the opposite.
-->
<link rel="canonical" href="https://brownthundercrypto-wq.github.io/keeta-tax-export/">
<style>
  body { font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
</style>
</head>
<body>
  <p>Redirecting to the tool…</p>
  <p>If nothing happens, <a href="./web/">open it here</a>.</p>
</body>
</html>
